server {
  listen 8080;
  server_name _;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self' wss://*.stadiumops.fifa2026.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;

  location /healthz {
    default_type application/json;
    return 200 '{"status":"ok","version":"1.0.0"}';
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
