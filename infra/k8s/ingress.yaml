apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stadiumops-copilot
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: ops.stadiumops.fifa2026.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stadiumops-copilot
                port:
                  number: 80
