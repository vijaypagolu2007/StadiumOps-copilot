apiVersion: apps/v1
kind: Deployment
metadata:
  name: stadiumops-copilot
  labels:
    app: stadiumops-copilot
spec:
  replicas: 6
  selector:
    matchLabels:
      app: stadiumops-copilot
  template:
    metadata:
      labels:
        app: stadiumops-copilot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: dashboard
          image: ghcr.io/example/stadiumops-copilot:1.0.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
