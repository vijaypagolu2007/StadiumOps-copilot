apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stadiumops-copilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stadiumops-copilot
  minReplicas: 6
  maxReplicas: 80
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
